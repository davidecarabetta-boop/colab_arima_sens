name: Automazione Script

on:
  schedule:
    - cron: "30 8 * * *"   # Spostato alle 8:30 per evitare congestione server GitHub
  workflow_dispatch:       # Consente avvio manuale (usalo per testare ora!)

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # AGGIORNATO (Risolve deprecazione Node)

      - name: Setup Python
        uses: actions/setup-python@v5 # AGGIORNATO (Risolve deprecazione Node)
        with:
          python-version: "3.10"
          cache: 'pip' # Velocizza le run successive

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread oauth2client google-auth statsmodels scipy numpy holidays prophet

      - name: Create credentials file
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 --decode > credentials.json
          # Verifica se il file è stato creato (se è vuoto, lo script fallirà qui)
          if [ ! -s credentials.json ]; then echo "ERRORE: Secret GOOGLE_CREDENTIALS non trovato o malformato"; exit 1; fi

      - name: Run script
        run: |
          python python_arima.py
